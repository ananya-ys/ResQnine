<!DOCTYPE html>
<html>

<head>

<title>ResQnine</title>

<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
background:#0a0a0a;
font-family:Arial;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:40px 20px;
text-align:center;
}

h1{
font-size:32px;
margin-bottom:5px;
}

.subtitle{
color:#aaa;
margin-bottom:30px;
}

button{
width:100%;
border:none;
padding:18px;
font-size:18px;
color:white;
border-radius:12px;
cursor:pointer;
margin:12px 0;
}

.sos{ background:#ff2b2b; }
.fake{ background:#2ecc71; }
.sms{ background:#3498db; }
.whatsapp{ background:#25D366; }

button:hover{
opacity:0.9;
}

#alertBox{
margin-top:20px;
padding:20px;
border-radius:10px;
background:#1f1f1f;
display:none;
}

#countdownBox{
display:none;
font-size:40px;
margin-top:20px;
color:#ff4c4c;
font-weight:bold;
}

#map{
height:400px;
margin-top:30px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>ResQnine</h1>
<p class="subtitle">Voice activated safety system</p>

<button class="sos" onclick="startCountdown()">
TRIGGER EMERGENCY ALERT
</button>

<button class="fake" onclick="fakeCall()">
FAKE CALL ESCAPE
</button>

<button class="sms" onclick="sendSMSLocation()">
SEND LOCATION (SMS)
</button>

<button class="whatsapp" onclick="sendWhatsAppLocation()">
SEND WHATSAPP ALERT
</button>

<div id="alertBox"></div>
<div id="countdownBox"></div>

<div id="panicScreen" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff1a1a;
color:white;
text-align:center;
padding-top:200px;
font-size:28px;
z-index:9999;
">

🚨 EMERGENCY MODE ACTIVE

<br><br>

Sending alerts to guardians...

<br><br>

<button onclick="cancelPanic()" style="
background:black;
color:white;
padding:15px 25px;
border:none;
border-radius:10px;
font-size:18px;
">

Cancel Alert

</button>

</div>

</div>

<div id="map"></div>

<div id="fakeCallScreen" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
text-align:center;
padding-top:200px;
font-size:30px;
">

📞 Incoming Call

<br><br>

<b>Mom</b>

<br><br>

<button onclick="endFakeCall()" style="background:red;padding:20px;border:none;color:white;border-radius:10px;">
Decline
</button>

</div>

<script>

/* ---------- MAP ---------- */

let map
let marker

function initMap(lat,lng){

map=L.map('map').setView([lat,lng],15)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map)

marker=L.marker([lat,lng]).addTo(map)
.bindPopup("🚨 Your Location")
.openPopup()

}

function updateMap(lat,lng){

if(marker){
marker.setLatLng([lat,lng])
map.setView([lat,lng])
}

}

/* ---------- INITIAL LOCATION ---------- */

navigator.geolocation.getCurrentPosition(function(position){

const lat=position.coords.latitude
const lng=position.coords.longitude

initMap(lat,lng)

})

/* ---------- BACKEND LOCATION ---------- */

async function sendLocationToBackend(lat,lng){

await fetch("http://127.0.0.1:8000/api/v1/location/update",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
latitude:lat,
longitude:lng
})
})

}

/* ---------- COUNTDOWN ---------- */

function startCountdown(){

const box=document.getElementById("countdownBox")

box.style.display="block"

let count=3

box.innerHTML="🚨 Panic Mode Activating: "+count

const timer=setInterval(()=>{

count--

box.innerHTML="🚨 Panic Mode Activating: "+count

if(count===0){

clearInterval(timer)

box.style.display="none"

panicMode()

}

},1000)

}

/* ---------- PANIC MODE ---------- */

function panicMode(){

console.log("PANIC MODE ACTIVATED")

document.getElementById("panicScreen").style.display="block"

triggerAlert()

sendSMSLocation()

sendWhatsAppLocation()

startEvidenceCapture()

startLiveTracking()

}

/* ---------- LIVE TRACKING ---------- */

function startLiveTracking(){

setInterval(()=>{

navigator.geolocation.getCurrentPosition(function(position){

const lat=position.coords.latitude
const lng=position.coords.longitude

updateMap(lat,lng)

sendLocationToBackend(lat,lng)

})

},5000)

}

/* ---------- SMS ---------- */

function sendSMSLocation(){

navigator.geolocation.getCurrentPosition(function(position){

const lat=position.coords.latitude
const lng=position.coords.longitude

const mapLink=`https://maps.google.com/?q=${lat},${lng}`

const message=encodeURIComponent(
"🚨 Emergency! I may be in danger. My location: "+mapLink
)

window.open(`sms:?body=${message}`)

})

}

/* ---------- WHATSAPP ---------- */

function sendWhatsAppLocation(){

navigator.geolocation.getCurrentPosition(function(position){

const lat = position.coords.latitude
const lng = position.coords.longitude

const mapLink = `https://maps.google.com/?q=${lat},${lng}`

const message = encodeURIComponent(
`🚨 EMERGENCY ALERT

I may be in danger.

My location:
${mapLink}`
)

const contacts = [
"918217465810",
"918809729001"
]

contacts.forEach((phone,index)=>{

setTimeout(()=>{
window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${message}`,"_blank")
},index*3000)

})

})

}

/* ---------- BACKEND ALERT ---------- */

async function triggerAlert(){

const alertBox=document.getElementById("alertBox")

alertBox.style.display="block"
alertBox.innerHTML="Sending alert..."

const response=await fetch("http://127.0.0.1:8000/api/v1/alert",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
latitude:12.9716,
longitude:77.5946,
location:"User Location"
})
})

const data=await response.json()

alertBox.innerHTML=`
<h2>🚨 ALERT</h2>
<p>${data.alert_message}</p>
<p>Risk Level: ${data.risk_level}</p>
`

}

/* ---------- FAKE CALL ---------- */

function fakeCall(){

const screen=document.getElementById("fakeCallScreen")

screen.style.display="block"

const audio=new Audio("https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg")

audio.loop=true
audio.play()

}

function endFakeCall(){

document.getElementById("fakeCallScreen").style.display="none"

location.reload()

}

/* ---------- CANCEL PANIC ---------- */

function cancelPanic(){

document.getElementById("panicScreen").style.display="none"

document.getElementById("alertBox").style.display="block"
document.getElementById("alertBox").innerHTML="Alert cancelled."

}

/* ---------- EVIDENCE CAPTURE ---------- */

async function startEvidenceCapture(){

console.log("Evidence capture starting")

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})

console.log("Camera permission granted")

const video=document.createElement("video")
video.srcObject=stream
video.play()

setTimeout(()=>{

const canvas=document.createElement("canvas")
canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")
ctx.drawImage(video,0,0)

const image=canvas.toDataURL("image/png")

console.log("Evidence captured")

saveEvidence(image)

},3000)

}catch(err){

console.log("Camera/Mic access denied",err)

}

}

function saveEvidence(image){

const evidence={
image:image,
timestamp:new Date().toISOString()
}

localStorage.setItem("resqnine_evidence",JSON.stringify(evidence))

console.log("Evidence stored locally")

}

/* ---------- VOICE TRIGGER ---------- */

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(SpeechRecognition){

const recognition=new SpeechRecognition()

recognition.continuous=true
recognition.lang="en-US"

recognition.onresult=function(event){

const transcript=event.results[event.results.length-1][0].transcript.toLowerCase()

console.log("Heard:",transcript)

if(
transcript.includes("help me") ||
transcript.includes("help") ||
transcript.includes("stop")
){

document.getElementById("alertBox").style.display="block"
document.getElementById("alertBox").innerHTML="Voice trigger detected..."

startCountdown()

}

}

recognition.start()

}

/* ---------- SERVICE WORKER ---------- */

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js")
.then(()=>console.log("Service Worker Registered"))
}

</script>

</body>
</html>
